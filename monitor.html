<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業モニター - OKABE GROUP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
</head>
<body class="monitor-page">
  <div class="monitor-container">
    <header class="monitor-header">
      <div class="monitor-title-block">
        <h1 class="monitor-title">OKABE GROUP</h1>
        <p class="monitor-subtitle">本日の作業状況</p>
      </div>
      <div class="monitor-clock" id="clock">--:--</div>
    </header>

    <!-- 1層：ステータス別カウンター -->
    <section class="monitor-summary">
      <div class="summary-counters" id="summary-counters"></div>
      <div class="summary-total" id="summary-total"></div>
    </section>

    <!-- 2層：時系列プログレスバー -->
    <section class="monitor-timeline">
      <div class="timeline-labels">
        <span>08:00</span>
        <span>18:00</span>
      </div>
      <div class="timeline-bar" id="timeline-bar"></div>
      <div class="timeline-now" id="timeline-now"></div>
    </section>

    <!-- 3層：進行中（カード形式） -->
    <section class="monitor-active">
      <h2 class="section-heading">進行中</h2>
      <div class="active-cards" id="active-cards"></div>
    </section>

    <!-- 4層：本日の全予定（表形式） -->
    <section class="monitor-schedule">
      <h2 class="section-heading">本日の全予定</h2>
      <table class="schedule-table" id="schedule-table">
        <thead>
          <tr>
            <th class="col-time">時刻</th>
            <th class="col-customer">顧客</th>
            <th class="col-vehicle">識別子</th>
            <th class="col-status">状態</th>
            <th class="col-times">作業時間</th>
          </tr>
        </thead>
        <tbody id="schedule-tbody"></tbody>
      </table>
    </section>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/common.js"></script>
  <script>
    initMonitor();
    setInterval(updateClock, 1000);
    setInterval(loadMonitorData, 5000);
    updateClock();
  </script>
</body>
</html>
