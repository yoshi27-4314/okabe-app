<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業モニター - OKABE GROUP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
</head>
<body class="monitor-page">
  <div class="monitor-container">
    <header class="monitor-header">
      <div class="monitor-title-block">
        <h1 class="monitor-title">OKABE GROUP</h1>
        <p class="monitor-subtitle">本日の作業状況</p>
      </div>
      <div class="monitor-clock" id="clock">--:--</div>
    </header>

    <!-- 上層：ステータス別カウンター -->
    <section class="monitor-summary">
      <div class="summary-counters" id="summary-counters">
        <!-- JSで動的生成 -->
      </div>
      <div class="summary-total" id="summary-total">
        <!-- JSで動的生成 -->
      </div>
    </section>

    <!-- 中層：時系列プログレスバー -->
    <section class="monitor-timeline">
      <div class="timeline-labels">
        <span class="timeline-label-start">08:00</span>
        <span class="timeline-label-end">18:00</span>
      </div>
      <div class="timeline-bar" id="timeline-bar">
        <!-- JSで動的生成 -->
      </div>
      <div class="timeline-now" id="timeline-now">
        <!-- 現在時刻マーカー -->
      </div>
    </section>

    <!-- 下層：個別カードグリッド -->
    <main class="monitor-grid" id="monitor-grid">
      <!-- 動的に生成 -->
    </main>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/common.js"></script>
  <script>
    initMonitor();
    setInterval(updateClock, 1000);
    setInterval(loadMonitorData, 5000);
    updateClock();
  </script>
</body>
</html>
