<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受付管理 - OKABE GROUP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <div class="app-logo">
      <a href="index.html" class="logo-link">OKABE GROUP</a>
    </div>
    <div class="app-user">
      <span class="user-role">フロントメンバー</span>
      <a href="index.html" class="role-switch">ロール変更 ▾</a>
    </div>
  </div>
</header>

<main class="page-content">
  <div class="page-header">
    <h1 class="page-title">受付管理</h1>
    <a href="reception.html?role=front" class="btn btn-primary">＋ 新規受付</a>
  </div>

  <p class="page-subtitle">本日：<span class="today-date"></span></p>

  <div id="reservation-list">
    <!-- 動的に生成 -->
  </div>
</main>

<script src="js/mock-data.js"></script>
<script src="js/common.js"></script>
<script>
function renderReservationList() {
  var reservations = getReservations();
  var container = document.getElementById('reservation-list');

  if (reservations.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:48px;color:var(--color-text-sub);">本日の予約はありません</div>';
    return;
  }

  container.innerHTML = reservations.map(function(r) {
    var subName = r.customerSubName ? '<div class="reservation-detail">' + r.customerSubName + '</div>' : '';
    var suffix = r.customerType === 'individual' ? ' 様' : '';
    var actionBtn = '';

    if (r.status === 'reserved') {
      actionBtn = '<div class="reservation-actions"><button class="btn btn-primary" onclick="receiveReservation(\'' + r.id + '\')">受付する</button></div>';
    }

    return '<div class="reservation-card status-' + r.status + '">' +
      '<div class="reservation-card-header">' +
        '<div>' +
          '<div class="reservation-time">' + r.time + '</div>' +
        '</div>' +
        '<span class="status-badge status-' + r.status + '">' + getStatusLabel(r.status) + '</span>' +
      '</div>' +
      '<div class="reservation-customer">' + r.customerName + suffix + '</div>' +
      subName +
      '<div class="reservation-detail">' + r.vehicleNumber + '・' + r.vehicleModel + '</div>' +
      '<div class="reservation-id">識別子：' + (r.contractIdentifier || '—') + '</div>' +
      '<div class="reservation-detail" style="margin-top:4px;">' + r.workType + '</div>' +
      actionBtn +
      '</div>';
  }).join('');
}

function receiveReservation(id) {
  updateReservation(id, { status: 'received' });
  renderReservationList();
  showToast({ title: '受付完了', detail: 'ステータスを受付済に変更しました' });
}

document.addEventListener('DOMContentLoaded', function() {
  renderReservationList();
});
</script>

</body>
</html>
