<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKABE GROUP タイヤホテル業務管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
</head>
<body class="role-selection-page">
  <a href="../" class="back-to-compare">&larr; 3案比較ページに戻る</a>
  <main class="role-selection-container">
    <header class="hero">
      <h1 class="hero-title">OKABE GROUP</h1>
      <p class="hero-subtitle">タイヤホテル業務管理システム</p>
    </header>

    <section class="role-cards">
      <h2 class="section-title">ロールを選択してください</h2>

      <div class="role-grid">
        <a href="staff-tasks.html?role=service" class="role-card">
          <div class="role-icon">🔧</div>
          <div class="role-name">サービススタッフ</div>
        </a>

        <a href="reception-list.html?role=front" class="role-card">
          <div class="role-icon">📋</div>
          <div class="role-name">フロントメンバー</div>
        </a>

        <a href="staff-tasks.html?role=manager" class="role-card">
          <div class="role-icon">🏭</div>
          <div class="role-name">工場長</div>
          <div class="role-staff">山田</div>
        </a>

        <a href="staff-tasks.html?role=sales" class="role-card">
          <div class="role-icon">💼</div>
          <div class="role-name">営業</div>
          <div class="role-staff">寺嶋</div>
        </a>

        <a href="staff-tasks.html?role=sales-manager" class="role-card">
          <div class="role-icon">📈</div>
          <div class="role-name">営業部長</div>
          <div class="role-staff">藤井</div>
        </a>

        <a href="staff-tasks.html?role=president" class="role-card">
          <div class="role-icon">👔</div>
          <div class="role-name">社長</div>
          <div class="role-staff">岡部</div>
        </a>
      </div>

      <a href="monitor.html" class="monitor-link">
        🖥 工場モニター（表示専用）
      </a>
    </section>
  </main>

  <script src="js/mock-data.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
